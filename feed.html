<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialHub - Feed</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">SocialHub</div>
        <nav class="topnav">
            <a href="feed.html" class="active-link">Feed</a>
            <a href="profile.html">Profile</a>
            <button class="logout-btn">Logout</button>
        </nav>
    </header>

    <main class="page-container grid-layout">
        <aside class="sidebar-card">
            <h3>Your Feed</h3>
            <p class="small-text">Your space to see your posts and others you follow. </p>
            <div class="info-list"></div>
        </aside>

        <section class="main-feed">
            <section class="card create-post-card">
                <h2>Create Post</h2>
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <button class="primary-btn">Post</button>
            </section>

            <section>
                <h2 class="section-title">Latest Posts</h2>
            </section>
        </section>
    </main>

</body>
</html>
