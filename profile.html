<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>SocialHub - Profile</title>
     <link rel="stylesheet" href="css/style.css">   
</head>
<body>
    <header class="topbar">
        <div class="brand">SocialHub</div>
        <nav class="topnav">
            <a href="feed.html">Feed</a>    
            <a href="profile.html" class="active-link">Profile</a> 
            <button class="logout-btn" >logout</button>
        </nav>
    </header>

    <main class="page-container grid-layout">
        <section class="main-feed">
            <section class="card profile-card">
                <h2>User Profile</h2>  
            </section>

            <section class="card">
                <h2 class="section-title">My Posts</h2>
            </section>
        </section>

        <aside class="sidebar-card">
            <h3>Other Users</h3>
            <p class="small-text">Follow users to see their posts in your feed.</p>
        </aside>
    </main>
</body>
</html>
